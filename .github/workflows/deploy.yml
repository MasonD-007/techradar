name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update image tags
        run: |
          # Update backend image to latest
          sed -i "s|ghcr.io/masond-007/nextjs_golang_template/backend:.*|ghcr.io/masond-007/nextjs_golang_template/backend:latest|g" k3s/apps/backend/deployment.yaml
          
          # Update frontend image to latest
          sed -i "s|ghcr.io/masond-007/nextjs_golang_template/frontend:.*|ghcr.io/masond-007/nextjs_golang_template/frontend:latest|g" k3s/apps/frontend/deployment.yaml
          
          echo "Updated image tags to: latest"
          echo "Backend:"
          grep "image:" k3s/apps/backend/deployment.yaml
          echo "Frontend:"
          grep "image:" k3s/apps/frontend/deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Stage the files first
          git add k3s/apps/backend/deployment.yaml k3s/apps/frontend/deployment.yaml
          
          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update image tags to latest"

      - name: Show changes
        run: |
          git diff HEAD~1 -- k3s/apps/
